<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper footer-minimal">
    <p class="footer-line">
      {%- if site.email -%}
        <a class="u-email" href="mailto:{{ site.email }}" aria-label="Email {{ site.author | default: site.title | escape }}">Email</a>
      {%- endif -%}
      {%- if site.linkedin_username -%}
        <span aria-hidden="true"> · </span><a href="https://www.linkedin.com/in/{{ site.linkedin_username }}/">LinkedIn</a>
      {%- endif -%}
    </p>
  </div>
</footer>
