<hr class="post-divider">
<div class="post_navi">
  {%- if page.previous.url -%}
  <a class="post_navi-item nav_prev" href="{{ page.previous.url | relative_url }}" title="{{ page.previous.title }}">
    <div class="post_navi-arrow">&lt;</div><div class="post_navi-label">Previous Post</div><div><span>{{ page.previous.title }}</span></div>
  </a>
  {%- else -%}
  <a class="post_navi-item nav_prev" href="{{ '/writing/' | relative_url }}" title="Writing">
    <div class="post_navi-arrow">&lt;</div><div class="post_navi-label">Writing</div><div><span>All essays and notes</span></div>
  </a>
  {%- endif -%}
  {%- if page.next.url -%}
  <a class="post_navi-item nav_next" href="{{ page.next.url | relative_url }}" title="{{ page.next.title }}">
    <div class="post_navi-arrow">&gt;</div><div class="post_navi-label">Next Post</div><div><span>{{ page.next.title }}</span></div>
  </a>
  {%- else -%}
  <a class="post_navi-item nav_next" href="{{ '/projects/' | relative_url }}" title="Projects">
    <div class="post_navi-arrow">&gt;</div><div class="post_navi-label">Projects</div><div><span>Research and technical archive</span></div>
  </a>
  {%- endif -%}
</div>
