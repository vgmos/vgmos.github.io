<nav class="post_navi" aria-label="Post navigation">
  {%- if page.previous.url -%}
    <a class="post_navi-link nav_prev" href="{{ page.previous.url | relative_url }}">← {{ page.previous.title }}</a>
  {%- else -%}
    <a class="post_navi-link nav_prev" href="{{ '/#notebook' | relative_url }}">← Notebook</a>
  {%- endif -%}

  {%- if page.next.url -%}
    <a class="post_navi-link nav_next" href="{{ page.next.url | relative_url }}">{{ page.next.title }} →</a>
  {%- else -%}
    <a class="post_navi-link nav_next" href="{{ '/#projects' | relative_url }}">Projects →</a>
  {%- endif -%}
</nav>
