title: Vasu Gupta
author: Vasu Gupta
email: vasugupta711@gmail.com
description: >-
  Technical project notes and essays from Vasu Gupta on analog IC design,
  power conversion, data converters, and engineering judgment.
url: "https://vgmos.github.io"
baseurl: ""
logo: /favicon.svg

theme: minima
github_username: vgmos
linkedin_username: vasugupta711

header_pages:
  - writing.md
  - projects.md
  - about.md

collections:
  projects:
    output: true
    permalink: /projects/:name/

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-default.png
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      tags:
        - reflection
  - scope:
      path: ""
      type: projects
    values:
      layout: project
