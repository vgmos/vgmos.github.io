title: Vasu Gupta
author: Vasu Gupta
email: vasugupta711@gmail.com
description: >-
  Analog IC design projects and notes from Vasu Gupta — power conversion,
  data converters, device modeling.
url: "https://vgmos.github.io"
baseurl: ""
logo: /favicon.svg

theme: minima
linkedin_username: vgmos

header_pages:
  - writing.md
  - about.md

collections:
  projects:
    output: true
    permalink: /projects/:name/

plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
    values:
      image: /assets/og-default.png
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      tags:
        - reflection
  - scope:
      path: ""
      type: projects
    values:
      layout: project
