title: Vasu Gupta
author: Vasu Gupta
email: vasugupta711@gmail.com
description: >-
  Reflective essays, technical notes, and a slowly restored archive of
  research projects across analog design, circuits, and computation.
url: "https://vgmos.github.io"
baseurl: ""

theme: minima
rss: rss
github_username: vgmos
linkedin_username: vasugupta711

header_pages:
  - writing.md
  - projects.md
  - about.md

collections:
  projects:
    output: true
    permalink: /projects/:name/

kramdown:
  syntax_highlighter_opts:
    disable: true
    
plugins:
  - jekyll-feed
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      tags:
        - reflection
  - scope:
      path: ""
      type: projects
    values:
      layout: project
